<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Sofía 💌</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            height: 100%; width: 100%; overflow: hidden;
            background-color: #05070a;
            font-family: 'Arial', sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        #bg-image {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://i.postimg.cc/pTTLRpFV/6ae41778-1039-41a8-a8b0-d62e943f6169.jpg') no-repeat center center fixed;
            background-size: cover;
            filter: brightness(0.4);
            z-index: 1;
            display: none;
        }

        .container { text-align: center; z-index: 10; width: 100%; position: relative; }

        #envelope { font-size: 100px; cursor: pointer; filter: drop-shadow(0 0 15px rgba(255,255,255,0.4)); transition: 0.3s; }
        #envelope:hover { transform: scale(1.1); }

        #message-content {
            display: none;
            padding: 30px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 85%; max-width: 450px;
            margin: 0 auto;
            color: white;
            min-height: 220px;
            display: flex; flex-direction: column; justify-content: center;
        }

        #typewriter { font-size: 1.2rem; font-style: italic; line-height: 1.6; color: #eee; }
        .cursor { border-right: 2px solid white; animation: blink 0.7s infinite; }
        @keyframes blink { 50% { border-color: transparent; } }

        h1 { font-size: 1.5rem; margin-bottom: 20px; color: #fff; }
        #sofia-footer { margin-top: 20px; color: #ffd700; font-weight: bold; opacity: 0; transition: 2s; }
        .star { position: absolute; color: gold; pointer-events: none; z-index: 100; }
    </style>
</head>
<body>

    <audio id="miMusica" src="música.mp3" preload="auto"></audio>

    <div id="bg-image"></div>

    <div class="container">
        <div id="closed-envelope" onclick="revealGift()">
            <div id="envelope">💌</div>
            <h2 style="color: white; margin-top: 20px;">Sofía, abre 💌</h2>
        </div>

        <div id="message-content">
            <h1>Para mi persona favorita...</h1>
            <div>
                <span id="typewriter"></span><span class="cursor"></span>
            </div>
            <p id="sofia-footer">Te quiero mucho, Sofía ❤️</p>
        </div>
    </div>

    <script>
        const frases = [
            "En este universo, mi lugar favorito es a tu lado.",
            "Eres mi rincón favorito en todo este espacio infinito.",
            "Cada estrella me recuerda un momento contigo.",
            "No necesito la luna si tengo tu sonrisa.",
            "Eres el sueño del que nunca quiero despertar.",
            "Contigo el tiempo se detiene y el alma vuela.",
            "Mi mundo es más bonito desde que estás tú.",
            "Te elegiría en esta y en mil vidas más.",
            "Me pierdo en tu mirada y me encuentro en tu corazón.",
            "Tu amor es mi aventura favorita.",
            "Eres el regalo más bonito que la vida me dio.",
            "Si el universo es infinito, mi amor por ti lo supera.",
            "Simplemente, gracias por existir.",
            "Eres lo mejor que me ha pasado, Sofía."
            // Puedes seguir agregando hasta las 30 aquí...
        ];

        let fraseIndex = 0;
        let charIndex = 0;
        const typewriterElement = document.getElementById('typewriter');

        function type() {
            if (charIndex < frases[fraseIndex].length) {
                typewriterElement.textContent += frases[fraseIndex].charAt(charIndex);
                charIndex++;
                setTimeout(type, 80);
            } else {
                setTimeout(erase, 2500);
            }
        }

        function erase() {
            if (charIndex > 0) {
                typewriterElement.textContent = frases[fraseIndex].substring(0, charIndex - 1);
                charIndex--;
                setTimeout(erase, 40);
            } else {
                fraseIndex = (fraseIndex + 1) % frases.length;
                setTimeout(type, 500);
            }
        }

        function revealGift() {
            // Reproducir música
            const musica = document.getElementById('miMusica');
            musica.play().catch(error => console.log("La reproducción automática fue bloqueada, pero se activará al toque."));

            // Mostrar contenido
            document.getElementById('bg-image').style.display = 'block';
            document.getElementById('closed-envelope').style.display = 'none';
            document.getElementById('message-content').style.display = 'flex';
            document.getElementById('sofia-footer').style.opacity = '1';
            
            type();
            for (let i = 0; i < 40; i++) { setTimeout(createStar, i * 100); }
        }

        function createStar() {
            const star = document.createElement('div');
            star.className = 'star';
            star.innerHTML = '★';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.fontSize = (Math.random() * 15 + 10) + 'px';
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 4000);
        }
    </script>
</body>
</html>
